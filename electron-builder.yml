appId: com.geoffdudgeon.duo
productName: Duo
copyright: Copyright © 2026 Geoff

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - package.json
  - "!node_modules/**/*"

extraResources:
  # skill/ is copied to app bundle so first-launch postinstall can copy it to ~/.claude/skills/duo/
  - from: skill/
    to: skill/
    filter:
      - "**/*"
  # cli/ contains the pre-built duo binary, installed via 'duo install' on first launch
  - from: cli/
    to: cli/
    filter:
      - "**/*"
  # agents/ is copied to app bundle so first-launch installer can copy duo-browser.md to ~/.claude/agents/
  - from: agents/
    to: agents/
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Stage 21: create build/icon.icns before running npm run dist
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # === Code-signing + notarization (Stage 21) =================================
  # Uncomment when the Developer ID Application cert is in Keychain and the
  # App Store Connect API key is at ~/.appstoreconnect/private_keys/<key>.p8.
  # All values come from env vars — never commit secrets to this file.
  #
  # Required env vars (see .env.example):
  #   CSC_NAME          → cert common name, e.g. "Developer ID Application: Geoff Dudgeon (TEAMID)"
  #                       (omit to let electron-builder auto-pick the only matching cert)
  #   APPLE_API_KEY     → absolute path to AuthKey_XXXX.p8
  #   APPLE_API_KEY_ID  → 10-char Key ID from App Store Connect
  #   APPLE_API_ISSUER  → Issuer UUID from App Store Connect → Users and Access → Integrations
  #   APPLE_TEAM_ID     → 10-char Team ID from developer.apple.com → Membership
  #
  # identity: ${env.CSC_NAME}
  # notarize:
  #   teamId: ${env.APPLE_TEAM_ID}
  # ============================================================================

dmg:
  title: "Duo ${version}"
  # Stage 21: flip to true once mac.identity + mac.notarize are uncommented above
  sign: false

asar: true
asarUnpack:
  # node-pty native module cannot live inside asar archive
  - "**/node_modules/node-pty/**"
